<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Compras</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        input, button { padding: 8px; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>Seguimiento de Compras</h1>
    <form id="purchase-form">
        <input type="text" id="item" placeholder="Producto" required>
        <input type="number" step="0.01" id="price" placeholder="Precio" required>
        <input type="date" id="date" required>
        <button type="submit">Agregar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody id="purchase-list"></tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
